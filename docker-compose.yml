version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: qtalgo
      POSTGRES_PASSWORD: qtalgo
      POSTGRES_DB: qtalgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://qtalgo:qtalgo@db:5432/qtalgo
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
